name: Publish to MCP Registry

# Publishes server.json to the official MCP registry
# (registry.modelcontextprotocol.io) using GitHub Actions OIDC auth —
# the interactive device-flow login is broken in mcp-publisher 1.7.9
# (fatal `slow_down` polling error), and OIDC is headless anyway.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for GitHub OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency (tag = pyproject = server.json)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          SERVER_VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['version'])")
          PKG_VERSION=$(python3 -c "import json; print(json.load(open('server.json'))['packages'][0]['version'])")
          echo "tag=$TAG_VERSION pyproject=$PYPROJECT_VERSION server.json=$SERVER_VERSION pkg=$PKG_VERSION"
          test "$TAG_VERSION" = "$PYPROJECT_VERSION" || { echo "::error::pyproject.toml version differs from tag"; exit 1; }
          test "$TAG_VERSION" = "$SERVER_VERSION"    || { echo "::error::server.json version differs from tag"; exit 1; }
          test "$TAG_VERSION" = "$PKG_VERSION"       || { echo "::error::server.json packages[0].version differs from tag"; exit 1; }
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Login via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
