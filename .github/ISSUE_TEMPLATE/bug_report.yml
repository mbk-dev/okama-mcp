name: Bug report
description: Report a problem with okama-mcp
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much of the
        form below as you can — it helps us reproduce and fix the problem faster.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the existing issues and this bug has not been reported yet.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Exact steps to reproduce the behavior. For tool calls, include the full
        tool name and arguments (e.g. the `PortfolioSpec` JSON you passed).
      placeholder: |
        1. Run `okama-mcp stdio`
        2. Call `analyze_portfolio` with `{"assets": [...], ...}`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: |
        Paste any relevant error messages, stack traces, or MCP client logs.
        This will be automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: okama-mcp version
      description: "`pip show okama-mcp` or `uvx okama-mcp --version`"
      placeholder: "1.3.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - streamable-http (self-hosted)
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - uvx
        - pipx
        - pip
        - source (poetry)
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Which client you connected with, if relevant.
      placeholder: "Claude Desktop / Claude Code / Cursor / ..."
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
