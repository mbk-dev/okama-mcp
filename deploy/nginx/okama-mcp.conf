server {
    if ($host = mcp.okama.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name mcp.okama.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }


}

server {
    listen 443 ssl http2;
    server_name mcp.okama.io;

    ssl_certificate /etc/letsencrypt/live/mcp.okama.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mcp.okama.io/privkey.pem; # managed by Certbot

    client_max_body_size 4m;

    # Static welcome page at the root.
    root /var/www/okama-mcp/public;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # MCP streamable-http endpoint — SSE, so disable buffering + use long timeouts.
    location /mcp {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;

        chunked_transfer_encoding on;
    }

    # Anything else: try static file, otherwise 404.
    location / {
        try_files $uri $uri/ =404;
    }
}
