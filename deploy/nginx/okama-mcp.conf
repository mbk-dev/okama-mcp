# Live vhost for mcp.okama.io — landing page only.
# The public /mcp endpoint was decommissioned 2026-06 (free & self-hosted model);
# for self-hosting see self-hosted.conf in this directory.

server {
    if ($host = mcp.okama.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name mcp.okama.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }


}

server {
    listen 443 ssl http2;
    server_name mcp.okama.io;

    ssl_certificate /etc/letsencrypt/live/mcp.okama.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mcp.okama.io/privkey.pem; # managed by Certbot

    client_max_body_size 4m;

    # Static welcome page at the root.
    root /var/www/okama-mcp/public;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    # Anything else: try static file, otherwise 404.
    location / {
        try_files $uri $uri/ =404;
    }
}
